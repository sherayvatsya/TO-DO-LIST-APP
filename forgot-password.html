<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="auth-shell">
    <section class="auth-card glass-card" aria-labelledby="forgotTitle">
      <a class="brand auth-brand" href="signin.html" aria-label="TaskFlow sign in">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 28 28" role="img">
            <rect x="3" y="3" width="22" height="22" rx="8"></rect>
            <path d="M8 14.5l4 4L20 9.5"></path>
          </svg>
        </span>
        <span>
          <strong>TaskFlow</strong>
          <small>Organize with clarity</small>
        </span>
      </a>

      <div class="auth-copy">
        <h1 id="forgotTitle">Forgot Password?</h1>
        <p>Verify your account with your security question.</p>
      </div>

      <form class="auth-form" id="forgotPasswordForm" novalidate>
        <div class="form-group">
          <label for="forgotEmail">Email Address</label>
          <div class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 6.5h16v11H4z"></path><path d="m4.5 7 7.5 6 7.5-6"></path></svg>
            </span>
            <input id="forgotEmail" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
          </div>
          <p class="field-error" data-error-for="forgotEmail"></p>
        </div>

        <div class="security-question-card" id="securityQuestionCard">
          <span>Security Question</span>
          <strong id="displaySecurityQuestion"></strong>
        </div>

        <div class="form-group" id="securityAnswerGroup" hidden>
          <label for="forgotSecurityAnswer">Security Answer</label>
          <div class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M15 7a4 4 0 1 0-3.5 3.96L5 17.5V20h2.5l6.54-6.5A4 4 0 0 0 15 7Z"></path><path d="M16.5 5.5 18 4"></path></svg>
            </span>
            <input id="forgotSecurityAnswer" name="securityAnswer" type="text" autocomplete="off" placeholder="Enter your answer" />
          </div>
          <p class="field-error" data-error-for="forgotSecurityAnswer"></p>
        </div>

        <button class="primary-button submit-button" id="forgotPasswordButton" type="submit" disabled>
          <span id="forgotButtonText">Find Account</span>
          <span class="loader" aria-hidden="true"></span>
        </button>
      </form>

      <p class="auth-switch">Remembered it? <a href="signin.html">Sign In</a></p>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
