<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="auth-body">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="auth-shell">
    <section class="auth-card glass-card" aria-labelledby="resetTitle">
      <a class="brand auth-brand" href="signin.html" aria-label="TaskFlow sign in">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 28 28" role="img">
            <rect x="3" y="3" width="22" height="22" rx="8"></rect>
            <path d="M8 14.5l4 4L20 9.5"></path>
          </svg>
        </span>
        <span>
          <strong>TaskFlow</strong>
          <small>Organize with clarity</small>
        </span>
      </a>

      <div class="auth-copy">
        <h1 id="resetTitle">Reset Password</h1>
        <p>Create a new password for your TaskFlow account.</p>
      </div>

      <form class="auth-form" id="resetPasswordForm" novalidate>
        <div class="form-group">
          <label for="resetPassword">New Password</label>
          <div class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg>
            </span>
            <input id="resetPassword" name="password" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
            <button class="icon-button password-toggle" type="button" aria-label="Show password" data-toggle-password="resetPassword">
              <svg viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <p class="field-error" data-error-for="resetPassword"></p>
        </div>

        <div class="form-group">
          <label for="resetConfirmPassword">Confirm New Password</label>
          <div class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="m20 7-10 10-5-5"></path></svg>
            </span>
            <input id="resetConfirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat new password" />
            <button class="icon-button password-toggle" type="button" aria-label="Show password" data-toggle-password="resetConfirmPassword">
              <svg viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <p class="field-error" data-error-for="resetConfirmPassword"></p>
        </div>

        <p class="form-success" id="resetSuccess" role="status"></p>

        <button class="primary-button submit-button" id="resetPasswordButton" type="submit" disabled>
          <span>Update Password</span>
          <span class="loader" aria-hidden="true"></span>
        </button>
      </form>

      <p class="auth-switch">Back to <a href="signin.html">Sign In</a></p>
    </section>
  </main>

  <script src="../js/auth.js"></script>
</body>
</html>
