<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="auth-body">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="auth-shell">
    <section class="auth-card glass-card" aria-labelledby="signinTitle">
      <a class="brand auth-brand" href="signin.html" aria-label="TaskFlow sign in">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 28 28" role="img">
            <rect x="3" y="3" width="22" height="22" rx="8"></rect>
            <path d="M8 14.5l4 4L20 9.5"></path>
          </svg>
        </span>
        <span>
          <strong>TaskFlow</strong>
          <small>Organize with clarity</small>
        </span>
      </a>

      <div class="auth-copy">
        <h1 id="signinTitle">Welcome Back!</h1>
        <p>Sign in to continue managing your tasks.</p>
      </div>

      <form class="auth-form" id="signinForm" novalidate>
        <div class="form-group">
          <label for="signinEmail">Email</label>
          <div class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M4 6.5h16v11H4z"></path><path d="m4.5 7 7.5 6 7.5-6"></path></svg>
            </span>
            <input id="signinEmail" name="email" type="email" autocomplete="email" placeholder="you@example.com" />
          </div>
          <p class="field-error" data-error-for="signinEmail"></p>
        </div>

        <div class="form-group">
          <label for="signinPassword">Password</label>
          <div class="field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg>
            </span>
            <input id="signinPassword" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" />
            <button class="icon-button password-toggle" type="button" aria-label="Show password" data-toggle-password="signinPassword">
              <svg viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <p class="field-error" data-error-for="signinPassword"></p>
        </div>

        <div class="form-row">
          <label class="check-control">
            <input id="rememberMe" type="checkbox" />
            <span>Remember Me</span>
          </label>
          <a href="forgot-password.html" class="text-link">Forgot Password?</a>
        </div>

        <button class="primary-button submit-button" id="signinButton" type="submit" disabled>
          <span>Sign In</span>
          <span class="loader" aria-hidden="true"></span>
        </button>
      </form>

      <div class="divider"><span>OR</span></div>

      <button class="guest-button" id="guestButton" type="button">
        Continue as Guest
      </button>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </section>
  </main>

  <script src="../js/auth.js"></script>
</body>
</html>
